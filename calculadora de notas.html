<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Médias 6º Semestre UNEXMED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #ffffff;
            --card: #f5f7f2;
            --text: #1b2539;
            --accent: #a4cf5d;
            --accent-dark: #5a7a2e;
            --input-bg: #ffffff;
            --input-border: rgba(0,0,0,0.06);
            --input-text: #3a475a;
            --shadow: 0 2px 20px rgba(17, 24, 39, 0.05);
            --shadow-hover: 0 8px 40px rgba(164, 207, 93, 0.10);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-image: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(164,207,93,0.12), transparent 70%);
            background-repeat: no-repeat;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--input-border);
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            border-color: rgba(164, 207, 93, 0.3);
            transform: translateY(-2px);
        }

        h3 {
            font-size: 1.15rem;
            color: var(--text);
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .inputs-area {
            flex-grow: 1;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text);
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-size: 16px;
            font-weight: 500;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(164, 207, 93, 0.2);
        }

        input::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        .result-area {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(0,0,0,0.1);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--accent-dark);
        }

        .result-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            background: rgba(164,207,93,0.15);
            padding: 4px 12px;
            border-radius: 8px;
        }

        .global-inputs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .global-inputs-grid input {
            margin-bottom: 0;
        }

        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .logo {
            max-width: 110px;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--text);
            text-align: center;
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            max-width: 600px;
            line-height: 1.1;
        }

        .subtitle {
            color: var(--accent-dark);
            text-align: center;
            font-size: 0.85rem;
            margin-top: 12px;
            margin-bottom: 0;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: rgba(164,207,93,0.15);
            padding: 4px 12px;
            border-radius: 20px;
        }

        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .global-inputs-grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 20px;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <img src="https://app.nivusmed.com.br/images/logo.svg" alt="Logo Nivus MED" class="logo">
            <h1>Estimativa de Notas - 6º Semestre UNEXMED (Meta 70)</h1>
            <p class="subtitle">Nivus MED</p>
        </div>
        
        <div class="card" style="margin-bottom: 20px;">
            <h3 style="margin-bottom: 15px;">Notas Comuns (Todas as matérias)</h3>
            <div class="global-inputs-grid">
                <input type="number" inputmode="decimal" step="0.1" placeholder="APA (0-100)" id="global-APA" oninput="calc()">
                <input type="number" inputmode="decimal" step="0.1" placeholder="OSCE (0-100)" id="global-OSCE" oninput="calc()">
            </div>
        </div>

        <div class="grid" id="app"></div>
    </div>

    <script>
        const config = [
            { name: "Habilidades Procedimentais I", target: "VAT2", weights: { VAT1: 0.25, VAP1: 0.15, VAT2: 0.25, VAP2: 0.15, APA: 0.1, OSCE: 0.1 } },
            { name: "Clínica Médica II", target: "VAT2", weights: { VAT1: 0.1, VAP1: 0.15, VATuT1: 0.15, VAT2: 0.10, VAP2: 0.15, VATuT2: 0.15, APA: 0.1, OSCE: 0.1 } },
            { name: "Saúde da Criança II", target: "VAT2", weights: { VAT1: 0.25, VAP1: 0.15, VAT2: 0.25, VAP2: 0.15, APA: 0.1, OSCE: 0.1 } },
            { name: "Metodologia da Pesquisa II", target: "VAT2", weights: { VAT1: 0.25, VAP1: 0.15, VAT2: 0.25, VAP2: 0.15, APA: 0.1, OSCE: 0.1 } },
            { name: "Saúde da Mulher II", target: "VAT2", weights: { VAT1: 0.25, VAP1: 0.15, VAT2: 0.25, VAP2: 0.15, APA: 0.1, OSCE: 0.1 } },
            { name: "Optativa I", target: "VAT1", weights: { VAT1: 0.8, APA: 0.1, OSCE: 0.1 } },
            { name: "Optativa II", target: "VAT1", weights: { VAT1: 0.8, APA: 0.1, OSCE: 0.1 } }
        ];

        function render() {
            // Inicializar inputs globais do localStorage
            document.getElementById('global-APA').value = localStorage.getItem('global-APA') || '';
            document.getElementById('global-OSCE').value = localStorage.getItem('global-OSCE') || '';

            const app = document.getElementById('app');
            app.innerHTML = '';
            config.forEach((sub, idx) => {
                let html = `
                    <div class="card">
                        <h3>${sub.name}</h3>
                        <div class="inputs-area">
                `;
                for (let key in sub.weights) {
                    if (key !== sub.target && key !== 'APA' && key !== 'OSCE') {
                        // Recupera valor salvo no localStorage
                        const savedVal = localStorage.getItem(`in-${idx}-${key}`) || '';
                        html += `<input type="number" inputmode="decimal" step="0.1" placeholder="${key} (0-100)" id="in-${idx}-${key}" value="${savedVal}" oninput="calc()">`;
                    }
                }
                html += `
                        </div>
                        <div class="result-area">
                            <span>${sub.target} necessária: </span>
                            <span class="result-value" id="out-${idx}">-</span>
                        </div>
                    </div>
                `;
                app.innerHTML += html;
            });
            calc(); // Calcula os resultados iniciais com base nos dados salvos
        }

        function calc() {
            const globalAPA = parseFloat(document.getElementById('global-APA').value) || 0;
            const globalOSCE = parseFloat(document.getElementById('global-OSCE').value) || 0;
            localStorage.setItem('global-APA', document.getElementById('global-APA').value);
            localStorage.setItem('global-OSCE', document.getElementById('global-OSCE').value);

            config.forEach((sub, idx) => {
                let currentPoints = 0;
                for (let key in sub.weights) {
                    if (key !== sub.target) {
                        let val = 0;
                        if (key === 'APA') {
                            val = globalAPA;
                        } else if (key === 'OSCE') {
                            val = globalOSCE;
                        } else {
                            const input = document.getElementById(`in-${idx}-${key}`);
                            val = parseFloat(input.value) || 0;
                            // Salva no localStorage em tempo real
                            localStorage.setItem(`in-${idx}-${key}`, input.value);
                        }
                        currentPoints += (val * sub.weights[key]);
                    }
                }
                const needed = (70 - currentPoints) / sub.weights[sub.target];
                // Exibe 0.0 se a nota necessária for negativa (já passou) e formata com uma casa decimal
                document.getElementById(`out-${idx}`).innerText = needed > 0 ? needed.toFixed(1) : "0.0";
            });
        }
        render();
    </script>
</body>
</html>
